<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hopa Țopa Land · Hopa în Grădină — alege locația</title>
  <meta name="description" content="Două locații, două experiențe. Alege Hopa Țopa Land (indoor, Colentina) sau Hopa în Grădină (outdoor, Mogoșoaia).">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://zincplusplus.github.io/hopatopaland/">
  <meta property="og:title" content="Hopa Țopa Land · Hopa în Grădină">
  <meta property="og:description" content="Alege locația potrivită: loc de joacă indoor în Colentina sau grădină de evenimente în Mogoșoaia.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://zincplusplus.github.io/hopatopaland/">
  <meta property="og:image" content="https://zincplusplus.github.io/hopatopaland/_import/indoor-hero-playground.jpg">
  <meta property="og:locale" content="ro_RO">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Hopa Țopa Land · Hopa în Grădină">
  <meta name="twitter:description" content="Două locații pentru petreceri și evenimente: indoor în Colentina și outdoor în Mogoșoaia.">
  <meta name="twitter:image" content="https://zincplusplus.github.io/hopatopaland/_import/indoor-hero-playground.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --indoor-bg: #FFF8EE;
      --indoor-accent: #E5478F;
      --indoor-accent-dark: #C73679;
      --indoor-ink: #2E1A2A;

      --outdoor-bg: #FFFCED;
      --outdoor-accent: #3F8738;
      --outdoor-accent-dark: #214F1F;
      --outdoor-ink: #183719;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; min-height: 100%; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #2E1A2A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .chooser {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    .choice {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-decoration: none;
      text-align: center;
      transition: filter 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .choice:hover { filter: brightness(1.03); }
    .choice:hover .choice__btn { transform: translateY(-2px); }

    .choice--indoor {
      background: var(--indoor-bg);
      color: var(--indoor-ink);
    }

    .choice--outdoor {
      background: var(--outdoor-bg);
      color: var(--outdoor-ink);
    }

    .choice__logo {
      max-width: 180px;
      max-height: 120px;
      margin-bottom: 1.5rem;
      object-fit: contain;
    }

    .choice__label {
      font-family: 'DynaPuff', system-ui, sans-serif;
      font-weight: 600;
      font-size: 2.5rem;
      margin: 0 0 0.5rem;
      line-height: 1.1;
    }

    .choice--indoor .choice__label { color: var(--indoor-accent); }
    .choice--outdoor .choice__label { color: var(--outdoor-accent); }

    .choice__sub {
      font-size: 1rem;
      color: inherit;
      opacity: 0.75;
      margin: 0 0 2rem;
      max-width: 28ch;
    }

    .choice__btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 1rem 2rem;
      border-radius: 999px;
      font-family: 'DynaPuff', system-ui, sans-serif;
      font-weight: 600;
      font-size: 1.25rem;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .choice--indoor .choice__btn {
      background: var(--indoor-accent);
      color: #fff;
      border: 2px solid var(--indoor-accent);
    }
    .choice--indoor .choice__btn:hover { background: var(--indoor-accent-dark); border-color: var(--indoor-accent-dark); }

    .choice--outdoor .choice__btn {
      background: var(--outdoor-accent);
      color: #fff;
      border: 2px solid var(--outdoor-accent);
    }
    .choice--outdoor .choice__btn:hover { background: var(--outdoor-accent-dark); border-color: var(--outdoor-accent-dark); }

    .choice__meta {
      margin-top: 1.25rem;
      font-size: 0.85rem;
      opacity: 0.6;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .choice__chevron {
      width: 1.1em;
      height: 1.1em;
    }

    @media (max-width: 720px) {
      .chooser {
        grid-template-columns: 1fr;
      }
      .choice {
        min-height: 50vh;
        padding: 2.5rem 1.25rem;
      }
      .choice__label { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <main class="chooser">
    <a class="choice choice--indoor" href="indoor.html" aria-label="Vezi locația Hopa Țopa Land, indoor în București Colentina">
      <img class="choice__logo" src="_import/sigla.webp" alt="Hopa Țopa Land">
      <h1 class="choice__label">Indoor</h1>
      <p class="choice__sub">Hopa Țopa Land — loc de joacă și aniversări în Colentina, București.</p>
      <span class="choice__btn">
        <span>Intră în Indoor</span>
        <svg class="choice__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </span>
      <span class="choice__meta">Șos. Colentina 60A · București</span>
    </a>

    <a class="choice choice--outdoor" href="outdoor.html" aria-label="Vezi locația Hopa în Grădină, outdoor în Mogoșoaia">
      <img class="choice__logo" src="_import/logo-hopa-in-gradina.png" alt="Hopa în Grădină">
      <h1 class="choice__label">Outdoor</h1>
      <p class="choice__sub">Hopa în Grădină — evenimente în aer liber pe 1.300 mp în Mogoșoaia.</p>
      <span class="choice__btn">
        <span>Intră în Outdoor</span>
        <svg class="choice__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </span>
      <span class="choice__meta">Str. C. Brâncoveanu 21 · Mogoșoaia</span>
    </a>
  </main>

</body>
</html>
